[phases.setup]
nixPkgs = [
  "nodejs_20",
  "php83",
  "php83Extensions.gd",
  "php83Extensions.pdo",
  "php83Extensions.pdo_sqlite",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "php83Extensions.tokenizer",
  "php83Extensions.xml",
  "php83Extensions.zip",
  "php83Extensions.bcmath",
  "php83Extensions.curl",
  "php83Extensions.intl",
  "php83Extensions.fileinfo",
  "php83Extensions.openssl",
  "php83Extensions.sodium",
  "php83Extensions.ctype",
  "php83Extensions.dom",
  "composer"
]

[phases.install]
cmds = [
  "composer install --optimize-autoloader --no-dev --no-interaction --no-scripts"
]

[phases.build]
cmds = [
  "npm ci",
  "npm run build",
  "composer run-script post-autoload-dump || true",
  "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs bootstrap/cache",
  "touch database/database.sqlite"
]

[start]
cmd = "sh /app/start.sh"
