[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.gd",
  "php84Extensions.pdo",
  "php84Extensions.pdo_sqlite",
  "php84Extensions.pdo_mysql",
  "php84Extensions.mbstring",
  "php84Extensions.tokenizer",
  "php84Extensions.xml",
  "php84Extensions.zip",
  "php84Extensions.bcmath",
  "php84Extensions.curl",
  "php84Extensions.intl",
  "php84Extensions.fileinfo",
  "php84Extensions.openssl",
  "php84Extensions.sodium",
  "php84Extensions.ctype",
  "php84Extensions.dom",
  "composer"
]

[phases.install]
cmds = [
  "composer install --optimize-autoloader --no-dev --no-interaction --no-scripts"
]

[phases.build]
cmds = [
  "npm ci",
  "npm run build",
  "composer run-script post-autoload-dump || true",
  "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs",
  "touch database/database.sqlite"
]

[start]
cmd = "sh start.sh"
