[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.gd",
  "php84Extensions.pdo",
  "php84Extensions.pdo_sqlite",
  "php84Extensions.pdo_mysql",
  "php84Extensions.mbstring",
  "php84Extensions.tokenizer",
  "php84Extensions.xml",
  "php84Extensions.zip",
  "php84Extensions.bcmath",
  "php84Extensions.curl",
  "php84Extensions.intl",
  "php84Extensions.fileinfo",
  "php84Extensions.openssl",
  "php84Extensions.sodium",
  "php84Extensions.ctype",
  "php84Extensions.dom",
  "composer"
]

[phases.install]
cmds = [
  "composer install --optimize-autoloader --no-dev --no-interaction --no-scripts"
]

[phases.build]
cmds = [
  "npm ci",
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
  "php artisan storage:link || true",
  "touch database/database.sqlite || true",
  "php artisan migrate --force --seed"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
